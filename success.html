<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Sent | Andikan Sampson</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg-0:#050505;
  --bg-1:#0a0a0a;
  --accent:#00D4FF;
  --success:#00FF9D;
  --white:#fff;
  --text-1:rgba(255,255,255,.92);
  --text-2:rgba(255,255,255,.65);
  --border:rgba(255,255,255,.08);

  --font-display:'Space Grotesk',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  background:var(--bg-0);
  color:var(--text-1);
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:var(--font-body);
  overflow:hidden;
}

.grid{
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
  background-size:60px 60px;
}

.card{
  position:relative;
  z-index:2;
  width:min(90%,650px);
  text-align:center;
  padding:60px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.02);
  backdrop-filter:blur(10px);
  border-radius:20px;
}

.check{
  width:90px;
  height:90px;
  margin:0 auto 30px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,255,157,.12);
  border:1px solid rgba(0,255,157,.3);
  color:var(--success);
  font-size:40px;
}

.tag{
  color:var(--accent);
  font-family:var(--font-mono);
  font-size:13px;
  margin-bottom:15px;
}

h1{
  font-family:var(--font-display);
  font-size:clamp(32px,5vw,50px);
  margin-bottom:18px;
}

p{
  color:var(--text-2);
  line-height:1.8;
  margin-bottom:35px;
}

.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:14px 28px;
  background:var(--accent);
  color:#001821;
  border-radius:10px;
  text-decoration:none;
  font-weight:600;
  transition:.2s;
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 0 20px rgba(0,212,255,.35);
}
</style>
</head>

<body>

<div class="grid"></div>

<div class="card">

  <div class="check">✓</div>

  <div class="tag">// MESSAGE RECEIVED</div>

  <h1>Inquiry Successfully Sent</h1>

  <p>
    Thank you for reaching out. Your project details have been received
    and reviewed. You can expect a response within 24 hours.
  </p>

  <a href="index.html" class="btn">
    Return to Portfolio
  </a>

</div>

</body>
</html>
