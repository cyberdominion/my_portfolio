<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — Andikan Sampson</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#050505;
    --bg-1:#0a0a0a;
    --bg-2:#111111;
    --bg-3:#161616;
    --accent:#00D4FF;
    --accent-dim:rgba(0,212,255,0.12);
    --accent-line:rgba(0,212,255,0.35);
    --success:#00FF9D;
    --white:#FFFFFF;
    --text-1:rgba(255,255,255,0.92);
    --text-2:rgba(255,255,255,0.62);
    --text-3:rgba(255,255,255,0.38);
    --border-1:rgba(255,255,255,0.08);
    --border-2:rgba(255,255,255,0.14);
    --font-display:'Space Grotesk', sans-serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'JetBrains Mono', monospace;
    --container:1180px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg-0);
    color:var(--text-1);
    font-family:var(--font-body);
    font-size:16px;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  img,svg{display:block;}
  a{color:inherit; text-decoration:none;}
  ul{list-style:none;}
  button{font-family:inherit; cursor:pointer; background:none; border:none; color:inherit;}
  .wrap{max-width:var(--container); margin:0 auto; padding:0 32px;}
  ::selection{background:var(--accent); color:var(--bg-0);}
  :focus-visible{outline:1.5px solid var(--accent); outline-offset:3px;}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; scroll-behavior:auto !important;}
  }

  .eyebrow{
    font-family:var(--font-mono);
    font-size:12.5px;
    letter-spacing:0.04em;
    color:var(--accent);
    display:flex; align-items:center; gap:8px;
    margin-bottom:18px;
  }
  .eyebrow::before{content:''; width:14px; height:1px; background:var(--accent);}

  h1,h2,h3{font-family:var(--font-display); font-weight:600; letter-spacing:-0.01em; color:var(--white);}
  .section{padding:120px 0; position:relative;}
  .section-head{max-width:640px; margin-bottom:64px;}
  .section-head h2{font-size:clamp(28px,3.4vw,38px); margin-bottom:14px;}
  .section-head p{color:var(--text-2); font-size:16px; max-width:520px;}
  .divider{border-top:1px solid var(--border-1);}

  /* ---------- nav ---------- */
  .nav{
    position:fixed; top:0; left:0; right:0; z-index:200;
    background:rgba(5,5,5,0.72);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border-bottom:1px solid var(--border-1);
  }

  .nav-avatar{
  width:32px;
  height:32px;
  border-radius:50%;
  object-fit:cover;
  border:1px solid var(--accent-line);
}

  .nav-inner{display:flex; align-items:center; justify-content:space-between; height:68px;}
  .logo{display:flex; align-items:center; gap:10px; font-family:var(--font-display); font-weight:600; font-size:15px;}
  .logo-mark{
    width:26px; height:26px; border:1px solid var(--accent-line); border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    color:var(--accent); font-family:var(--font-mono); font-size:12px;
  }
  .nav-links{display:flex; align-items:center; gap:34px;}
  .nav-links a{font-size:13.5px; color:var(--text-2); transition:color .15s ease;}
  .nav-links a:hover{color:var(--white);}
  .nav-right{display:flex; align-items:center; gap:14px;}
  .kbtn{
    display:flex; align-items:center; gap:8px;
    border:1px solid var(--border-2); border-radius:7px;
    padding:7px 10px; font-size:12px; color:var(--text-2);
    transition:border-color .15s ease, color .15s ease;
  }
  .kbtn:hover{border-color:var(--accent-line); color:var(--white);}
  .kbtn kbd{font-family:var(--font-mono); font-size:11px; background:var(--bg-2); border:1px solid var(--border-2); border-radius:4px; padding:1px 5px;}
  .btn{
    font-size:13.5px; font-weight:500; padding:10px 20px; border-radius:8px;
    display:inline-flex; align-items:center; gap:8px;
    transition:transform .15s ease, background .15s ease, border-color .15s ease, box-shadow .2s ease;
  }
  .btn-primary{background:var(--accent); color:#001821;}
  .btn-primary:hover{box-shadow:0 0 0 1px var(--accent), 0 0 24px rgba(0,212,255,0.35); transform:translateY(-1px);}
  .btn-ghost{border:1px solid var(--border-2); color:var(--text-1);}
  .btn-ghost:hover{border-color:var(--accent-line); background:var(--accent-dim);}
  .btn-sm{padding:8px 16px; font-size:13px;}
  .icon{width:15px; height:15px; flex-shrink:0;}
  @media (max-width:880px){ .nav-links{display:none;} }

  /* ---------- hero ---------- */
  .hero{position:relative; min-height:100vh; display:flex; flex-direction:column; justify-content:center; padding-top:68px; overflow:hidden;}
  .hero-grid{
    position:absolute; inset:0; z-index:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size:64px 64px;
    mask-image:radial-gradient(ellipse 70% 60% at 50% 35%, black 10%, transparent 75%);
    -webkit-mask-image:radial-gradient(ellipse 70% 60% at 50% 35%, black 10%, transparent 75%);
  }
  #particles{position:absolute; inset:0; z-index:1; opacity:0.55;}
  .hero-content{position:relative; z-index:2; padding:80px 0 0;}
  .hero-content h1{
    font-size:clamp(38px,6vw,68px); line-height:1.06; letter-spacing:-0.02em;
    max-width:880px; margin-bottom:26px;
  }
  .hero-content h1 .hl{
    color:var(--accent);
    background:linear-gradient(180deg, transparent 64%, var(--accent-dim) 64%);
  }
  .hero-sub{font-size:17.5px; color:var(--text-2); max-width:560px; margin-bottom:38px;}
  .hero-cta{display:flex; gap:14px; margin-bottom:88px;}

  .ticker{
    position:relative; z-index:2; border-top:1px solid var(--border-1); border-bottom:1px solid var(--border-1);
    overflow:hidden; background:rgba(255,255,255,0.015);
  }
  .ticker-track{display:flex; width:max-content; animation:scroll-left 32s linear infinite;}
  .ticker-track span{
    font-family:var(--font-mono); font-size:12.5px; color:var(--text-2);
    padding:14px 28px; white-space:nowrap; border-right:1px solid var(--border-1);
  }
  .ticker-track span b{color:var(--success); font-weight:500;}
  @keyframes scroll-left{ from{transform:translateX(0);} to{transform:translateX(-50%);} }

  /* ---------- trust ---------- */
  .trust{padding:80px 0; border-bottom:1px solid var(--border-1);}
  .stat-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--border-1); border:1px solid var(--border-1); border-radius:12px; overflow:hidden; margin-bottom:40px;}
  .stat{background:var(--bg-0); padding:30px 28px;}
  .stat .num{font-family:var(--font-display); font-size:34px; color:var(--white); font-weight:600;}
  .stat .num .accent{color:var(--accent);}
  .stat .label{font-size:13px; color:var(--text-2); margin-top:6px;}
  .role-strip{display:flex; flex-wrap:wrap; gap:10px;}
  .pill{
    font-family:var(--font-mono); font-size:12px; color:var(--text-2);
    border:1px solid var(--border-2); border-radius:20px; padding:7px 14px;
  }
  @media (max-width:760px){ .stat-grid{grid-template-columns:repeat(2,1fr);} }

  /* ---------- about ---------- */
  .about-grid{display:grid; grid-template-columns:1fr 1fr; gap:80px; align-items:start;}
  .about-grid p{color:var(--text-2); margin-bottom:18px; font-size:15.5px; max-width:480px;}
  .about-grid p:last-of-type{margin-bottom:0;}
  .terminal{
    background:var(--bg-2); border:1px solid var(--border-2); border-radius:12px; overflow:hidden;
  }
  .terminal-bar{display:flex; align-items:center; gap:7px; padding:12px 16px; border-bottom:1px solid var(--border-1);}
  .terminal-bar i{width:9px; height:9px; border-radius:50%; background:var(--border-2);}
  .terminal-bar span{font-family:var(--font-mono); font-size:11.5px; color:var(--text-3); margin-left:6px;}
  .terminal-body{padding:22px 20px; font-family:var(--font-mono); font-size:13px; line-height:2.05;}
  .terminal-body .p{color:var(--accent);}
  .terminal-body .o{color:var(--text-2); padding-left:14px;}
  .terminal-body .o b{color:var(--success); font-weight:500;}
  .cursor{display:inline-block; width:7px; height:14px; background:var(--accent); vertical-align:-2px; animation:blink 1.1s steps(2) infinite;}
  @keyframes blink{50%{opacity:0;}}
  @media (max-width:860px){ .about-grid{grid-template-columns:1fr; gap:48px;} }

  /* ---------- timeline ---------- */
  .timeline-wrap{position:relative; padding-left:32px; border-left:1px solid var(--border-1);}
  .timeline-item{position:relative; padding-bottom:40px;}
  .timeline-item:last-child{padding-bottom:0;}
  .timeline-item::before{content:''; position:absolute; left:-37px; top:4px; width:9px; height:9px; border-radius:50%; background:var(--accent); box-shadow:0 0 0 4px var(--bg-0), 0 0 0 1px var(--border-2);}
  .timeline-year{font-family:var(--font-mono); font-size:13px; color:var(--accent); margin-bottom:8px;}
  .timeline-body h3{font-size:18px; margin-bottom:8px;}
  .timeline-body p{font-size:14.5px; color:var(--text-2); max-width:560px;}

  /* ---------- expertise ---------- */
  .exp-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:1px; background:var(--border-1); border:1px solid var(--border-1); border-radius:14px; overflow:hidden;}
  .exp-card{background:var(--bg-0); padding:36px; transition:background .2s ease;}
  .exp-card:hover{background:var(--bg-1);}
  .exp-card .ic{width:34px; height:34px; border:1px solid var(--border-2); border-radius:9px; display:flex; align-items:center; justify-content:center; color:var(--accent); margin-bottom:20px;}
  .exp-card h3{font-size:18px; margin-bottom:14px;}
  .exp-card ul li{font-size:14px; color:var(--text-2); padding:6px 0; display:flex; gap:10px;}
  .exp-card ul li::before{content:''; width:4px; height:4px; border-radius:50%; background:var(--accent); margin-top:8px; flex-shrink:0;}
  @media (max-width:760px){ .exp-grid{grid-template-columns:1fr;} }

  /* ---------- projects ---------- */
  .proj-card{
    border:1px solid var(--border-1); border-radius:14px; padding:0; margin-bottom:24px;
    display:grid; grid-template-columns:1.05fr 1fr; overflow:hidden; transition:border-color .2s ease;
  }
  .proj-card:hover{border-color:var(--border-2);}
  .proj-media{
    background:
      repeating-linear-gradient(135deg, rgba(0,212,255,0.05) 0 2px, transparent 2px 14px),
      var(--bg-2);
    border-right:1px solid var(--border-1);
    min-height:280px; display:flex; align-items:center; justify-content:center; position:relative;
  }
  .proj-media span{font-family:var(--font-mono); font-size:11.5px; color:var(--text-3); border:1px dashed var(--border-2); padding:8px 14px; border-radius:8px;}
  .proj-body{padding:34px 36px; display:flex; flex-direction:column;}
  .proj-tag{font-family:var(--font-mono); font-size:11.5px; color:var(--accent); margin-bottom:14px;}
  .proj-body h3{font-size:21px; margin-bottom:14px;}
  .proj-row{font-size:14px; color:var(--text-2); margin-bottom:8px;}
  .proj-row b{color:var(--text-1); font-weight:500;}
  .proj-stack{display:flex; flex-wrap:wrap; gap:7px; margin:18px 0 20px;}
  .chip{font-family:var(--font-mono); font-size:11px; color:var(--text-2); border:1px solid var(--border-2); border-radius:6px; padding:4px 9px;}
  .proj-impact{font-size:13.5px; color:var(--success); margin-bottom:22px;}
  .proj-links{display:flex; gap:18px; margin-top:auto;}
  .proj-links a{font-size:13.5px; display:flex; align-items:center; gap:6px; color:var(--text-1); transition:color .15s ease;}
  .proj-links a:hover{color:var(--accent);}
  @media (max-width:860px){ .proj-card{grid-template-columns:1fr;} .proj-media{border-right:none; border-bottom:1px solid var(--border-1); min-height:180px;} }

  /* ---------- lab ---------- */
  .lab-wrap{border:1px solid var(--border-1); border-radius:14px; padding:40px;}
  .lab-stats{display:flex; gap:48px; margin-bottom:32px; flex-wrap:wrap;}
  .lab-stats .stat-mini .num{font-family:var(--font-display); font-size:26px; color:var(--white);}
  .lab-stats .stat-mini .label{font-size:12.5px; color:var(--text-2); margin-top:4px;}
  .log{border-top:1px solid var(--border-1); padding-top:22px;}
  .log-row{display:flex; gap:18px; padding:10px 0; font-family:var(--font-mono); font-size:13px; border-bottom:1px solid rgba(255,255,255,0.04);}
  .log-row:last-child{border-bottom:none;}
  .log-time{color:var(--text-3); width:90px; flex-shrink:0;}
  .log-text{color:var(--text-2);}
  .log-status{margin-left:auto; color:var(--success); flex-shrink:0;}
  @media (max-width:600px){ .log-row{flex-wrap:wrap;} .log-status{margin-left:0;} }

  /* ---------- services ---------- */
  .svc-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:20px;}
  .svc-card{border:1px solid var(--border-1); border-radius:14px; padding:30px; display:flex; flex-direction:column; transition:border-color .2s ease, transform .2s ease;}
  .svc-card:hover{border-color:var(--accent-line); transform:translateY(-2px);}
  .svc-card h3{font-size:17px; margin-bottom:14px;}
  .svc-price{margin-bottom:18px;}
  .svc-price .from{display:block; font-family:var(--font-mono); font-size:11px; letter-spacing:0.04em; color:var(--text-3); margin-bottom:4px;}
  .svc-price .amt{font-family:var(--font-display); font-size:21px; color:var(--accent); font-weight:600;}
  .svc-price .ngn{display:block; font-family:var(--font-mono); font-size:12px; color:var(--text-3); margin-top:3px;}
  .svc-features{margin-bottom:22px; flex-grow:1;}
  .svc-features li{font-size:13.5px; color:var(--text-2); padding:5px 0; display:flex; gap:9px;}
  .svc-features li::before{content:''; width:4px; height:4px; border-radius:50%; background:var(--accent); margin-top:8px; flex-shrink:0;}
  .svc-meta{display:flex; align-items:center; justify-content:space-between; padding-top:18px; border-top:1px solid var(--border-1);}
  .svc-time{font-family:var(--font-mono); font-size:11.5px; color:var(--text-3);}
  .svc-cta{font-size:13px; color:var(--accent); display:flex; align-items:center; gap:6px;}
  .svc-note{font-size:12.5px; color:var(--text-3); margin-top:28px; max-width:680px;}
  @media (max-width:860px){ .svc-grid{grid-template-columns:1fr 1fr;} }
  @media (max-width:600px){ .svc-grid{grid-template-columns:1fr;} }

  /* ---------- current focus ---------- */
  .focus-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:16px;}
  .focus-card{border:1px solid var(--border-1); border-radius:12px; padding:26px; transition:border-color .2s ease;}
  .focus-card:hover{border-color:var(--border-2);}
  .focus-card .dot{width:8px; height:8px; border-radius:50%; background:var(--success); margin-bottom:18px; box-shadow:0 0 0 4px rgba(0,255,157,0.12);}
  .focus-card h3{font-size:15.5px; margin-bottom:8px;}
  .focus-card p{font-size:13.5px; color:var(--text-2); line-height:1.6;}
  @media (max-width:860px){ .focus-grid{grid-template-columns:1fr 1fr;} }
  @media (max-width:600px){ .focus-grid{grid-template-columns:1fr;} }

  /* ---------- stack ---------- */
  .stack-wrap{display:flex; flex-wrap:wrap; gap:12px;}
  .stack-chip{
    border:1px solid var(--border-2); border-radius:9px; padding:13px 20px;
    font-family:var(--font-mono); font-size:13.5px; color:var(--text-2);
    transition:border-color .15s ease, color .15s ease, background .15s ease;
  }
  .stack-chip:hover{border-color:var(--accent-line); color:var(--white); background:var(--accent-dim);}

  /* ---------- vision ---------- */
  .vision{background:var(--bg-2); border-top:1px solid var(--border-1); border-bottom:1px solid var(--border-1);}
  .vision .wrap{text-align:center; padding:0;}
  .vision-text{font-family:var(--font-display); font-size:clamp(24px,3.2vw,36px); line-height:1.42; max-width:900px; margin:0 auto; color:var(--white);}
  .vision-text .accent{color:var(--accent);}

  /* ---------- contact ---------- */
  .contact-grid{display:grid; grid-template-columns:0.85fr 1.15fr; gap:70px;}
  .contact-grid h2{font-size:clamp(30px,4vw,44px); margin-bottom:18px; max-width:420px;}
  .contact-grid > div:first-child p{color:var(--text-2); font-size:15.5px; margin-bottom:36px; max-width:400px;}
  .contact-method{display:flex; align-items:center; gap:14px; padding:16px 0; border-top:1px solid var(--border-1);}
  .contact-method:last-child{border-bottom:1px solid var(--border-1);}
  .contact-method .ic{width:36px; height:36px; border:1px solid var(--border-2); border-radius:9px; display:flex; align-items:center; justify-content:center; color:var(--accent); flex-shrink:0;}
  .contact-method .label{font-size:11.5px; color:var(--text-3); font-family:var(--font-mono);}
  .contact-method .val{font-size:14.5px; color:var(--text-1); margin-top:2px; transition:color .15s ease;}
  .contact-method:hover .val{color:var(--accent);}

  .form-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  .field{margin-bottom:16px;}
  .field.full{grid-column:1 / -1;}
  .field label{display:block; font-size:12.5px; color:var(--text-2); margin-bottom:8px; font-family:var(--font-mono);}
  .field input, .field select, .field textarea{
    width:100%; background:var(--bg-2); border:1px solid var(--border-2); border-radius:8px;
    padding:12px 14px; color:var(--text-1); font-family:var(--font-body); font-size:14px;
    transition:border-color .15s ease;
  }
  .field input:focus, .field select:focus, .field textarea:focus{border-color:var(--accent-line); outline:none;}
  .field textarea{resize:vertical; min-height:100px;}
  .form-note{font-size:12.5px; color:var(--text-3); margin-top:14px;}
  .form-success{display:none; font-family:var(--font-mono); font-size:13.5px; color:var(--success); padding:14px 0; border-top:1px solid var(--border-1); margin-top:8px;}
  @media (max-width:860px){ .contact-grid{grid-template-columns:1fr; gap:48px;} .form-grid{grid-template-columns:1fr;} }

  /* ---------- footer ---------- */
  footer{border-top:1px solid var(--border-1); padding:50px 0;}
  .foot-grid{display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:32px; margin-bottom:36px;}
  .foot-links{display:flex; gap:28px; flex-wrap:wrap;}
  .foot-links a{font-size:13.5px; color:var(--text-2); transition:color .15s ease;}
  .foot-links a:hover{color:var(--white);}
  .foot-bottom{display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px; padding-top:24px; border-top:1px solid var(--border-1); font-size:12.5px; color:var(--text-3); font-family:var(--font-mono);}

  /* ---------- reveal ---------- */
  .reveal{opacity:0; transform:translateY(18px); transition:opacity .6s ease, transform .6s ease;}
  .reveal.in{opacity:1; transform:translateY(0);}

  /* ---------- command palette ---------- */
  .cmdk-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(3px); z-index:500;
    display:none; align-items:flex-start; justify-content:center; padding-top:14vh;
  }
  .cmdk-overlay.open{display:flex;}
  .cmdk{width:560px; max-width:90vw; background:var(--bg-2); border:1px solid var(--border-2); border-radius:12px; overflow:hidden;}
  .cmdk-input{display:flex; align-items:center; gap:10px; padding:16px 18px; border-bottom:1px solid var(--border-1);}
  .cmdk-input input{flex:1; background:none; border:none; color:var(--text-1); font-size:14.5px; font-family:var(--font-body);}
  .cmdk-input input:focus{outline:none;}
  .cmdk-list{max-height:280px; overflow-y:auto; padding:8px;}
  .cmdk-item{display:flex; align-items:center; justify-content:space-between; padding:11px 14px; border-radius:8px; font-size:13.5px; color:var(--text-2);}
  .cmdk-item span.k{color:var(--text-3); font-family:var(--font-mono); font-size:11px;}
  .cmdk-item.active{background:var(--accent-dim); color:var(--white);}
</style>
</head>
<body>

<nav class="nav">
  <div class="wrap nav-inner">
    <a href="#home" class="logo">
      <img src="images/profile image.jpg"
       alt="Andikan Sampson"
       class="nav-avatar">
      Andikan Sampson</a>
    <div class="nav-links">
      <a href="#about">About</a>
